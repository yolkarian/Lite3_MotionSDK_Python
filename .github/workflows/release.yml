name: Build and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            zig-target: x86_64-linux-gnu
            wheel-platform: linux_x86_64
          - arch: aarch64
            zig-target: aarch64-linux-gnu
            wheel-platform: linux_aarch64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Clean build outputs
        run: rm -rf build dist zig-out .zig-cache lite3_motion_sdk/_lib.abi3.so pydust.build.zig

      - name: Build native extension
        run: uv run python scripts/build_extension.py --target ${{ matrix.zig-target }} --optimize ReleaseSafe

      - name: Run tests on native runner
        if: matrix.arch == 'x86_64'
        run: uv run pytest

      - name: Build wheel
        run: uv build --wheel

      - name: Verify wheel artifact
        run: |
          python - <<'PY'
          from pathlib import Path

          wheels = sorted(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one wheel, found: {[str(path) for path in wheels]}")

          expected_platform = "${{ matrix.wheel-platform }}"
          wheel_name = wheels[0].name
          if expected_platform not in wheel_name:
              raise SystemExit(f"wheel {wheel_name} does not contain expected platform tag {expected_platform}")

          print(wheel_name)
          PY

      - name: Set up QEMU for aarch64 smoke test
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Smoke test aarch64 wheel under QEMU
        if: matrix.arch == 'aarch64'
        run: |
          docker run --rm -i --platform linux/arm64 \
            -v "$PWD/dist:/dist:ro" \
            ubuntu:24.04 \
            bash -euxo pipefail <<'EOF'
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends python3 python3-venv libstdc++6 libgcc-s1
          python3 -m venv /tmp/venv
          /tmp/venv/bin/python -m pip install --no-index /dist/*.whl
          /tmp/venv/bin/python - <<'PY'
          import lite3_motion_sdk
          import lite3_motion_sdk._lib

          assert lite3_motion_sdk.SDK == 2
          print("aarch64 smoke import OK")
          PY
          EOF

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-wheel-${{ matrix.arch }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Clean build outputs
        run: rm -rf build dist *.egg-info

      - name: Build source distribution
        run: uv build --sdist

      - name: Upload source distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - build-wheels
      - build-sdist
    permissions:
      contents: write
      pull-requests: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: ls -lh release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-artifacts/*
